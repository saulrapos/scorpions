<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Búsqueda Documental IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

<nav class="bg-white shadow-sm py-4 px-8 flex justify-between items-center">
    <div class="flex items-center gap-2">
        <i class="fa-solid fa-layer-group text-blue-600 text-2xl"></i>
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">Nexus</h1>
    </div>
    <div class="text-sm font-medium text-slate-500">HackUDC 2026 - Equipo Scorpions</div>
</nav>

<main class="max-w-4xl mx-auto mt-12 px-4">

    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8">
        <h2 class="text-lg font-semibold mb-4"><i class="fa-solid fa-folder-open mr-2 text-blue-500"></i>1. Sube una Carpeta de Documentos</h2>
        <div class="flex items-center gap-4">
            <input type="file" id="fileInput" webkitdirectory directory multiple class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all"/>
            <button id="btnUpload" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-medium transition-colors whitespace-nowrap">
                Subir e Indexar
            </button>
        </div>
        <p id="uploadStatus" class="text-sm mt-3 text-emerald-600 hidden font-medium"></p>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-xl border border-slate-100 shadow-blue-900/5">
        <h2 class="text-2xl font-bold mb-2 text-center">¿Qué necesitas encontrar hoy?</h2>
        <p class="text-slate-500 text-center mb-6">Busca por concepto, no solo por palabras clave. La IA entenderá el contexto.</p>

        <div class="relative max-w-2xl mx-auto">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
            </div>
            <input type="text" id="searchInput" placeholder="Ej: ¿Cuáles son las condiciones de penalización del contrato?" class="block w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-inner">
            <button id="btnSearch" class="absolute inset-y-2 right-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 rounded-xl font-medium transition-colors">
                Buscar
            </button>
        </div>
    </div>

    <div id="resultsContainer" class="mt-8 space-y-4 hidden">
        <h3 class="text-lg font-semibold text-slate-700 mb-4">Resultados encontrados:</h3>
        <div id="resultsList" class="space-y-4">
        </div>
    </div>

</main>

<script>
    const API_URL = "http://127.0.0.1:8000";

    // --- 1. LÓGICA DE SUBIDA DE CARPETAS ---
    document.getElementById('btnUpload').addEventListener('click', async () => {
        const fileInput = document.getElementById('fileInput');
        const statusText = document.getElementById('uploadStatus');
        const btn = document.getElementById('btnUpload');

        const files = fileInput.files;
        if (files.length === 0) {
            alert("Por favor, selecciona una carpeta o archivos primero.");
            return;
        }

        btn.innerText = "Procesando IA...";
        btn.disabled = true;
        statusText.classList.remove('hidden');
        statusText.className = "text-sm mt-3 text-blue-600 font-medium animate-pulse";
        
        let successCount = 0;
        let errorCount = 0;
        const formatosPermitidos = ['pdf', 'docx', 'txt', 'csv'];

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const ext = file.name.split('.').pop().toLowerCase();
            
            if (!formatosPermitidos.includes(ext)) continue; 

            statusText.innerText = `Indexando: ${file.name} (${i + 1}/${files.length})...`;
            
            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch(`${API_URL}/api/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    successCount++;
                } else {
                    errorCount++;
                }
            } catch (error) {
                errorCount++;
            }
        }

        statusText.className = "text-sm mt-3 text-emerald-600 font-medium";
        statusText.innerHTML = `<i class="fa-solid fa-check-circle mr-1"></i> ¡Listo! ${successCount} archivos procesados con éxito.`;
        
        btn.innerText = "Subir e Indexar";
        btn.disabled = false;
        fileInput.value = ""; 
    });

    // --- 2. LÓGICA DE BÚSQUEDA ---
    document.getElementById('btnSearch').addEventListener('click', realizarBusqueda);
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') realizarBusqueda();
    });

    async function realizarBusqueda() {
        const query = document.getElementById('searchInput').value;
        const btn = document.getElementById('btnSearch');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsList = document.getElementById('resultsList');

        if (!query.trim()) return;

        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Buscando...';
        btn.disabled = true;
        resultsContainer.classList.add('hidden');
        resultsList.innerHTML = '';

        try {
            const response = await fetch(`${API_URL}/api/search`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pregunta: query })
            });

            const data = await response.json();

            if (data.resultados && data.resultados.length > 0) {
                data.resultados.forEach(res => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition-shadow";

                    const score = Math.max(1, 99 - (res.distancia * 50)).toFixed(0);
                    
                    let iconClass = "fa-file-alt text-slate-500";
                    if(res.archivo.endsWith('.pdf')) iconClass = "fa-file-pdf text-red-500";
                    else if(res.archivo.endsWith('.docx')) iconClass = "fa-file-word text-blue-500";
                    else if(res.archivo.endsWith('.csv')) iconClass = "fa-file-csv text-green-600";

                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-2">
                                <i class="fa-solid ${iconClass} text-xl"></i>
                                <span class="font-semibold text-slate-800">${res.archivo}</span>
                            </div>
                            <span class="bg-emerald-100 text-emerald-700 text-xs font-bold px-3 py-1 rounded-full">
                                <i class="fa-solid fa-bolt mr-1"></i> ${score}% Relevancia
                            </span>
                        </div>
                        <p class="text-slate-600 text-sm leading-relaxed border-l-4 border-indigo-200 pl-4 italic">
                            "...${res.texto}..."
                        </p>
                    `;
                    resultsList.appendChild(card);
                });
                resultsContainer.classList.remove('hidden');
            } else {
                resultsList.innerHTML = '<p class="text-slate-500 text-center py-4">No se encontró información relevante para tu pregunta.</p>';
                resultsContainer.classList.remove('hidden');
            }
        } catch (error) {
            alert("Error al buscar. Comprueba la conexión con el backend.");
        } finally {
            btn.innerHTML = 'Buscar';
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
